# buf v2 codegen. Output is COMMITTED and lane-forbidden to engineers; the
# maintainer re-generates on schema change (npm run generate:proto).
#   - src/generated       → server-side stubs (Epic 000 SU3, connect-node)
#   - clients/web/src/gen  → web client (Epic 020 SU7, connect-web). protobuf-es
#     v2 descriptors are transport-agnostic, so connect-web consumes the same
#     generated service directly — no separate connect plugin needed.
version: v2
plugins:
  - local: protoc-gen-es
    out: src/generated
    opt:
      - target=js+dts
      - import_extension=js
  - local: protoc-gen-es
    out: clients/web/src/gen
    opt:
      - target=ts
