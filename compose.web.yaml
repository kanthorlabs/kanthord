# Real local development stack: Core plus the Vite dashboard.
#
# The containers share one network namespace. Core can keep its required
# loopback-only bind while Vite proxies same-origin Connect RPCs to it. Only the
# dashboard port is published to the host.
services:
  core:
    image: kanthord-core-dev
    build:
      context: .
      dockerfile: Containerfile.dev
    userns_mode: keep-id
    environment:
      KANTHORD_DATA: /data/kanthord-auth
    volumes:
      - ./.data:/data:Z
    ports:
      - "127.0.0.1:${WEB_PORT:-5173}:5173"
    command:
      - node
      - src/cli/run.ts
      - --slot
      - ${KANTHORD_SLOT:-/data/kanthord-auth/slots/kanthord-verify.yaml}
      - --account
      - ${KANTHORD_ACCOUNT:-codex}
      - --model
      - ${KANTHORD_MODEL:-gpt-5.4-mini}
      - --port
      - "7777"

  web:
    image: kanthord-web-dev
    build:
      context: .
      dockerfile: Containerfile.web-dev
    depends_on:
      - core
    userns_mode: keep-id
    network_mode: "service:core"
    environment:
      VITE_API_PROXY_TARGET: http://127.0.0.1:7777
