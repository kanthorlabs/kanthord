# Kanthor Core — Podman dev compose: "develop inside containers".
#
# Why this exists (on top of the single-container Makefile flow):
# UDS is NOT connectable across the macOS host -> VM boundary (virtiofs), but it
# IS connectable between two containers that share a *named volume*. So when both
# server (Core) and client run in containers, they talk over UDS via the `sock`
# volume — no TCP needed inside the sandbox.
#
# Layout:
#   - .data/  (host bind mount)  -> DB / logs / auth / cache, host-inspectable
#   - sock    (named volume)     -> UDS only, nested at /data/sockets so it stays
#                                   OFF virtiofs (proven: works across containers)
#
# Run with podman-compose:  make compose-up / make compose-down
# (Both server and client run the stand-in scripts until real Core/client exist;
#  swap `command:` for the real entrypoints then — mounts stay the same.)

services:
  server:
    image: kanthord-dev
    build:
      context: .
      dockerfile: Containerfile
    userns_mode: keep-id
    environment:
      DATA_DIR: /data
      SOCK: /data/sockets/kanthord.sock
      PORT: "7777"
    volumes:
      - ./.data:/data:Z          # DB/logs/auth/cache on the host
      - sock:/data/sockets       # UDS on a named volume (off virtiofs)
    ports:
      - "127.0.0.1:7777:7777"    # TCP also published, for host clients
    command: ["node", "scripts/dev/smoke.mjs"]

  client:
    image: kanthord-dev
    depends_on:
      - server
    userns_mode: keep-id
    environment:
      SOCK: /data/sockets/kanthord.sock
    volumes:
      - sock:/data/sockets       # same UDS, shared with the server
    command: ["node", "scripts/dev/uds-client.mjs"]

volumes:
  sock:
