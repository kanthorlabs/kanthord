<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=./phase-1.html">
  <title>Kanthor Core Docs</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --card: rgba(17, 35, 66, 0.9);
      --line: rgba(154, 184, 226, 0.28);
      --text: #ecf5ff;
      --muted: #a9bbd5;
      --cyan: #4bd5ff;
      --green: #84f0a4;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 18% 18%, rgba(75, 213, 255, 0.16), transparent 28rem),
        linear-gradient(135deg, #050914 0%, var(--bg) 48%, #101a31 100%);
      color: var(--text);
    }

    main {
      width: min(680px, 100%);
      padding: clamp(24px, 5vw, 42px);
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--card);
      box-shadow: 0 24px 90px rgba(0, 0, 0, 0.38);
    }

    p:first-child {
      margin: 0 0 14px;
      color: var(--green);
      font: 700 0.82rem ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 4.6rem);
      line-height: 0.94;
      letter-spacing: -0.07em;
    }

    p {
      color: var(--muted);
      line-height: 1.6;
      font-size: 1.05rem;
    }

    a {
      display: inline-flex;
      margin-top: 12px;
      padding: 12px 16px;
      border: 1px solid rgba(75, 213, 255, 0.5);
      border-radius: 999px;
      color: white;
      background: rgba(75, 213, 255, 0.13);
      text-decoration: none;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <p>Kanthor Core Docs</p>
    <h1>Phase 1 Architecture</h1>
    <p>Redirecting to the shareable Phase 1 C4 model and sequence diagrams.</p>
    <a href="./phase-1.html">Open Phase 1</a>
  </main>
</body>
</html>
