name: ci

on:
  pull_request:

permissions:
  contents: read

jobs:
  gate-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      # Node 24 bundles npm 11.6.x; engines require >= 11.18, so bump first
      # (engine-strict would otherwise fail `npm ci`).
      - run: npm install -g npm@11.18.0
      - run: npm ci
      - run: npm run typecheck
